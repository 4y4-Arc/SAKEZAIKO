<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>在庫一覧</title>
</head>
<body>

    <h1>在庫検索</h1>

    <form action="/search/result" method="get">

        <p>
            <label>商品名</label><br>
            <input type="text" name="keyword">
        </p>

        <p>
            <label>種類</label><br>
            <select name="category">
                <option value="">すべて</option>
                <option value="日本酒">日本酒</option>
                <option value="ワイン">ワイン</option>
                <option value="ウイスキー">ウイスキー</option>
            </select>
        </p>

        <p>
    <label>残量範囲</label><br>

    <input
        type="range"
        name="remain"
        min="0"
        max="100"
        value="50"
        oninput="remainValue.textContent = this.value + '%'">

    <span id="remainValue">50%</span>

    <br>
    <span>0%</span>
    <span style="margin-left:180px;">100%</span>
</p>

        <button type="submit">検索</button>

        <button type="reset">リセット</button>

    </form>

</body>
</html>
